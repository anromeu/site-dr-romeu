<style>
    /* ==========================================================
       1. MENU SUPERIOR FIXO (STICKY NAVBAR)
       ========================================================== */
    .navbar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        z-index: 9999 !important;
        background-color: #ffffff !important;
        border-bottom: 1px solid #eee !important;
        padding: 10px 0 !important;
        transition: all 0.3s ease;
    }

    body {
        padding-top: 85px !important; 
    }

    /* ==========================================================
       2. ESPAÇAMENTOS E SCROLL DO MENU FIXO
       ========================================================== */
    html {
        scroll-padding-top: 85px !important; 
        scroll-behavior: smooth !important;
    }

    section, #about, #achievements, #contact {
        padding-top: 50px !important;
        padding-bottom: 50px !important;
        scroll-margin-top: 0 !important; 
    }

    /* ==========================================================
       3. SECÇÃO HERO (DESKTOP E MOBILE)
       ========================================================== */
    @media (min-width: 992px) {
        .hero a.btn, .hero button, .hero-btn-container {
            margin-left: 0 !important;
            margin-right: auto !important;
            text-align: left !important;
        }
    }

    @media (max-width: 991px) {
        #hero .container > .row {
            display: flex !important;
            flex-direction: column-reverse !important;
        }
        #hero {
            padding-top: 10px !important;
            text-align: center !important;
        }
        #hero .hero-image-container, #hero img {
            margin-top: 0 !important;
            margin-bottom: 35px !important; 
            display: block !important;
            margin-left: auto !important;
            margin-right: auto !important;
        }
        #hero h1 {
            font-size: 1.8rem !important;
            margin-bottom: 10px !important;
        }
        #hero h2 {
            font-size: 1.15rem !important;
            color: #777777 !important;
        }
    }
    
    /* ==========================================================
       4. BOTÃO VOLTAR AO TOPO
       ========================================================== */

    /* 1. DESLIGAR BACK-TO-TOP THEME (#topScroll) */
    #topScroll {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
    }

    /* 2. LAYOUT DO BOTÃO (#back-to-top) */
    /* Design: Branco, Redondo, 44px, Sombra suave */
    #back-to-top {
        position: fixed !important;
        bottom: 25px !important;
        right: 25px !important;
        width: 44px !important;
        height: 44px !important;
        background-color: #ffffff !important;
        color: #777777 !important;
        border: 1px solid #dddddd !important;
        border-radius: 50% !important;
        z-index: 99999 !important;

        /* Alinhamento */
        display: none !important; /* Escondido por padrão, o JS ativa-o */
        align-items: center !important;
        justify-content: center !important;
        text-decoration: none !important;
        
        /* Estética e Suavidade */
        opacity: 0;
        transition: all 0.3s ease-in-out !important;
        
    }

    /* 3. TRIGGER: Mostrar o teu botão quando tiver a classe .active */
    #back-to-top.active {
        display: inline-flex !important;
        opacity: 1 !important;
    }

    /* 4. HOVER (O teu azul marinho) */
    #back-to-top:hover {
        color: #003366 !important;
        border-color: #003366 !important;
        transform: scale(0.9) !important;
        background-color: #f8f9fa !important;
    }

    /* 5. REMOVER O 'GLOW' (Outline/Sombra ao focar ou clicar) */
    /* Isto remove o brilho azul padrão do navegador e sombras fortes ao clicar */
    #back-to-top:focus, 
    #back-to-top:active, 
    #back-to-top:visited {
        outline: none !important;
        box-shadow: none !important; /* Removemos sombras completamente no clique/foco */
    }

    /* 6. LIMPEZA (Garante que não aparecem ícones estranhos do tema) */
    #back-to-top span, #back-to-top i, #back-to-top svg, #back-to-top::before {
        display: none !important;
        content: none !important;
    }

        
    /* ==========================================================
       5. LIMPEZA DE BORDAS E GLOWS
       ========================================================== */
    * { 
        box-shadow: none !important; 
        filter: none !important; 
        text-shadow: none !important; 
        outline: none !important;
    }

    #hero img, #hero picture img, .hero-image-container img, .hero-img img, img.hero-img { 
        border: none !important;        
        outline: none !important;       
        filter: none !important;        
        box-shadow: none !important;    
        border-radius: 50% !important; 
        padding: 0 !important;          
        opacity: 1 !important;          
        background-color: transparent !important; 
    }

    #hero, .container, .row, body, section, .card {
        background-color: #ffffff !important;
        background: #ffffff !important;
    }

    /* ==========================================================
       6. LOGÓTIPO HORIZONTAL (SEO SEGURO)
       ========================================================== */
    .navbar-brand {
        font-size: 0 !important; 
        color: transparent !important;
    }
    .navbar-brand *:not(img) { 
        display: none !important; 
        visibility: hidden !important;
        opacity: 0 !important;
        position: absolute !important;
    }
    .navbar-brand img {
        display: block !important;
        font-size: 16px !important; 
        content: url("/images/logo.webp") !important;
        height: 60px !important; 
        width: auto !important;
    }

    /* ==========================================================
       7. ALINHAMENTO DE TÍTULOS (CENTRADOS)
       ========================================================== */
    .section-title, #experience h2, #achievements h2, .experience-titlem {
        text-align: center !important;
        color: #003366 !important;
        font-weight: 700 !important;
        margin-bottom: 40px !important;
        width: 100% !important;
        display: block !important;
    }

    /* ==========================================================
       8. SECÇÃO REUMATOLOGIA (#achievements)
       ========================================================== */
    
    /* 1. Reset de Estrutura e Largura Total */
    #achievements .container { max-width: 1400px !important; width: 96% !important; }
    #achievements .row { display: block !important; margin: 0 !important; }
    
    /* LIMPEZA GLOBAL E ESPAÇAMENTOS */
    #achievements [class*="col-"], 
    #achievements .card, 
    #achievements .card-body, 
    #achievements .card-text {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
    }

    /* 2. Títulos: "O Reumatologista" e "As Principais Doenças..." */
    #achievements .card-title {
        display: block !important;
        font-size: 1.3rem !important;
        color: #003366 !important;
        font-weight: 700 !important;
        border-bottom: 1px solid #eee !important;
        padding-bottom: 10px !important;
        margin: 30px 0 15px 0 !important;
        text-align: left !important;
    }

    /* 3. Estilo do Texto (Intro e Lista) */
    #achievements .card-text {
        color: #444444 !important;
        font-size: 1.05rem !important;
        line-height: 1.7 !important;
        display: block !important;
    }

    /* 4. Lista de Doenças */
    #achievements [class*="col-"]:nth-child(n+3) .card-text {
        position: relative !important;
        padding-left: 30px !important;
        margin-bottom: 8px !important;
    }

    /* O traço vertical azul (Design Identitário) */
    #achievements [class*="col-"]:nth-child(n+3) .card-text::before {
        content: '' !important;
        position: absolute !important;
        left: 0 !important; 
        top: 4px !important;
        width: 4px !important; 
        height: 1.2rem !important;
        background-color: #003366 !important;
        border-radius: 2px !important;
    }

    /* 5. Ajustes de Exceção */
    #achievements [class*="col-"]:nth-child(1) .card-text { margin-bottom: 30px !important; }
    #achievements [class*="col-"]:nth-child(2) .card-text,      /* Esconde texto vazio no título 2 */
    #achievements [class*="col-"]:nth-child(n+3) .card-title { /* Esconde títulos repetidos na lista */
        display: none !important; 
    }

    /* ==========================================================
       9. ESCALA TIPOGRÁFICA MOBILE (< 991px)
       ========================================================== */
    @media (max-width: 991px) {
        body, p, li, a, .card-text, .text-secondary {
            font-size: 1rem !important; 
            line-height: 1.5 !important;
        }
        #hero h1, #hero .display-1, #hero .display-2 {
            font-size: 1.75rem !important;
            line-height: 1.2 !important;
            margin-bottom: 8px !important;
            font-weight: 700 !important;
        }
        #hero h2, #hero .hero-subtitle {
            font-size: 1.1rem !important;
            color: #777777 !important;
            font-weight: 500 !important;
            margin-top: 0 !important;
        }
        .section-title, #experience h2, #achievements h2, #contact h2 {
            font-size: 1.5rem !important;
            margin-bottom: 24px !important;
        }
        .card-title, h4, .card h4 {
            font-size: 1.2rem !important;
            font-weight: 700 !important;
            margin-bottom: 12px !important;
        }
    }

    /* ==========================================================
       10. CONSULTÓRIOS E RODAPÉ
       ========================================================== */
    #contact h3, .contact-city-title {
        font-size: 1.75rem !important; 
        font-weight: 500 !important;
        color: #003366 !important;
        margin-bottom: 15px !important;
        letter-spacing: 0px;
        margin-top: 0 !important;
    }

    #contact h4, .clinic-name, #contact strong {

        color: #333333 !important;
        display: block;
        margin-bottom: 10px !important;
    }

    #contact a, #contact p {

        color: #444444 !important;
        text-decoration: none !important;
    }

    #contact a:hover {
        color: #003366 !important;
        text-decoration: underline !important;
    }

    .whatsapp-link {
        display: inline-flex !important;
        align-items: center !important;  /* Alinhamento vertical central */

        gap: 8px !important;
        margin-top: 15px !important;
        font-weight: 700 !important;
        color: #25D366 !important;
        text-decoration: none !important;
        line-height: 1 !important;       /* ESSENCIAL: Remove o espaço extra da fonte */

    }

    .whatsapp-link span {
        display: inline-block !important;
        line-height: 1 !important;       /* Garante que o texto não tenha "gordura" em volta */
    }

    .whatsapp-link svg {

    }

    .whatsapp-link:hover {
        text-decoration: underline !important;
    }

       11. SECÇÃO "SOBRE MIM" (ESTRUTURA E TEXTO CORRIDO)
       ========================================================== */

    #about .timeline-section::before,
    #about .timeline-icon,

    /* ==========================================================
       12. SECÇÃO "SOBRE MIM" (TIPOGRAFIA E LISTAS UNIFICADAS)
       ========================================================== */
    /* Libertar limites do texto */
    #about .about-content, #about .content, #about ul, #about p {
        max-width: 100% !important; width: 100% !important; display: block !important; white-space: normal !important;
    }

    /* Introdução */

        font-size: 1.3rem !important; line-height: 1.7; color: #333; margin-bottom: 25px;
    }

    /* Títulos Intermédios (ex: Percurso Profissional) */
    #about .content strong {
        font-size: 1.3rem !important; color: #003366 !important; display: block; 
        margin-top: 30px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px;
    }

    /* Configuração Única e Limpa das Listas (Marcadores azuis) */
    #about ul {
        list-style-type: none; padding-left: 0; margin-top: 20px;
    }

    #about ul li {
        position: relative !important;
        padding-left: 30px !important; 
        margin-bottom: 12px !important;
        font-size: 1.05rem !important;
        line-height: 1.6 !important;
        color: #444444 !important;
        max-width: 100% !important;
        width: 100% !important;
        display: block !important;
        white-space: normal !important; 
    }

    /* O traço azul vertical */
    #about ul li::before {
        content: ''; position: absolute; left: 0; top: 4px; width: 4px; height: 1.2rem;
        background-color: #003366 !important; border-radius: 2px;
    }

    /* Datas do tamanho do texto + Cor Azul Marinho */
    #about .content ul li strong,
    #about .content ul li b {
        font-size: 1em !important;      /* Tamanho igual ao texto à frente */
        color: #003366 !important;      /* AZUL MARINHO que querias */
        font-weight: 700 !important;    /* Negrito */
        display: inline !important; 
        border: none !important;        /* Remove a linha de baixo do título */
        padding: 0 !important; 
        margin: 0 !important;
        text-decoration: none !important;
    }


    /* ==========================================================
       13. BOTÃO HERO: EFEITO HOVER E CENTRADO  (MOBILE)
       ========================================================== */
    
    /* 1. Estado Normal e Hover */
    .hero a.btn, #hero a.btn, .btn-primary {
        color: #003366 !important; 
        border-color: #003366 !important;
        background-color: transparent !important;
        font-weight: normal !important; 
        transition: all 0.3s ease !important; 
    }

    .hero a.btn:hover, #hero a.btn:hover, .btn-primary:hover {
        background-color: #003366 !important; 
        color: #ffffff !important;            
        border-color: #003366 !important;
    }

    /* 2. Bootstrap (Mobile) */
    @media (max-width: 991px) {
        
        /* Caixas flexíveis do Bootstrap dentro do Hero alinhadas ao centro */

        .hero div,
        #hero .d-flex, 
        .hero .d-flex {
            justify-content: center !important;
            text-align: center !important;
            align-items: center !important;
        }

        /* Força a margem do botão a distribuir espaço por igual */
        #hero a.btn, 
        .hero a.btn,
        #hero button {
            display: flex !important;
            margin-left: auto !important;
            margin-right: auto !important;
            margin-top: 25px !important;
            margin-bottom: 25px !important;
        }
    }

    /* ==========================================================
       14. REMOVER ÍNDICE (TOC) NA POLÍTICA DE PRIVACIDADE
       ========================================================== */
    /* 1. Esconde o menu de índice que aparece à direita */
    .toc, #toc, #TableOfContents, .toc-container {
        display: none !important;
    }

    /* 2. Força o conteúdo a ocupar os 100% da largura (sem a coluna vazia) */
    .col-lg-9 {
        flex: 0 0 100% !important;
        max-width: 100% !important;
    }
    
    /* Ajuste extra para o texto não ficar colado às bordas */
    .content-column {
        padding-right: 0 !important;
    }
    
    
</style>
