    title: "Saúde Reumática e Óssea"
    items:
      - title: "A Reumatologia e o Especialista"
        content: |-
          O Reumatologista é o médico especialista formado e treinado para a prevenção, o diagnóstico e o tratamento das doenças reumáticas. 

          Estas são um conjunto de mais de 100 doenças que podem surgir em qualquer idade, podendo ter diferentes causas e que atingem preferencialmente os tecidos do tecido conjuntivo das articulações, como a membrana sinovial, as cartilagens e os ossos, assim como os ligamentos, tendões e músculos. No caso das doenças reumáticas sistémicas, podem atingir também outros aparelhos, como a pele, os olhos e os sistemas cardiovascular, respiratório e renal.

      - title: "Osteoartrose e Osteoporose"
        content: |-
          As doenças reumáticas mais comuns são a osteoartrose e as lesões dos tecidos peri-articulares, como as comummente designadas “tendinites”, frequentemente associadas à sobrecarga das estruturas essenciais à função das articulações. 

          Muito frequente, sobretudo a partir dos 65 anos na mulher e dos 70 anos no homem, é também a osteoartrose, que corresponde a uma fragilidade dos ossos de que resulta a ocorrência de fraturas com traumatismos ligeiros (punho, vértebras e anca), das quais podem resultar incapacidade definitiva e mesmo risco de vida.

      - title: "Doenças Sistémicas e Inflamatórias"
        content: |-
          Igualmente comuns são a gota úrica e a condrocalcinose. Já as doenças reumáticas sistémicas, ou “doenças auto-imunes”, são inflamações mediadas pelo sistema imunitário que podem evoluir para incapacidade permanente se não forem precocemente diagnosticadas. 

          São exemplos a artrite reumatóide, a artrite psoriática, as espondilartrites (como a espondilite anquilosante), o lúpus eritematoso sistémico, a síndrome de Sjögren, as miopatias inflamatórias, as vasculites e a esclerose sistémica (“esclerodermia”).

