  about:
    enable: true
    title: "Sobre o Dr. José Carlos Romeu"
    image: "images/jcr.webp"
    content: |-
      Médico Reumatologista com uma carreira de excelência dedicada à prevenção e ao diagnóstico e tratamento das doenças reumáticas e ósseas metabólicas.

      **Percurso Profissional**
      * **1980** Licenciatura em Medicina pela Faculdade de Medicina de Lisboa.
      * **1990** Grau de Assistente Hospitalar de Reumatologia no Hospital de Santa Maria (HSM).
      * **1991** Título de Especialista em Reumatologia pela Ordem dos Médicos.
      * **1993 — 2024** Coordenador da Consulta de Doenças Ósseas Metabólicas da Unidade de Reumatologia do HSM.
      * **2002** Grau de Assistente Hospitalar Graduado / Consultor de Reumatologia no HSM.
      * **2010 — 2024** Coordenador da Unidade de Internamento do Serviço de Reumatologia e Doenças Ósseas Metabólicas do HSM.
      * **2015 — 2024** Consultor dos Centros de Referência para a Área das Doenças Hereditárias do Metabolismo e para a Área da Paramiloidose Familiar do HSM.
      * **2016 — 2024** Membro da Equipa Multidisciplinar de Doenças Ósseas Raras do HSM, integrada na Rede Europeia de Referência (ERN-BOND).
      * **2016 — 2024** Cofundador e Coordenador da Unidade de Doenças Ósseas Metabólicas do Serviço de Reumatologia do HSM.
      * **2020 - 2024** Fundador e Coordenador da Consulta de Ligação à Fratura (em parceria com a Ortopedia) do HSM.
      * **2020 — 2024** Co-coordenador da FLS (Fracture Liaison Service) do HSM.
      <br>

      **Funções Institucionais e Atividade Científica**
      * Fundador da Associação Portuguesa de Osteoporose (1994) e Vice-Presidente da sua primeira Direção.
      * Vice-Presidente da Sociedade Portuguesa de Reumatologia (2004-2006; 2006-2008; 2010-2012).
      * Autor de mais de 300 comunicações científicas e 91 publicações em revistas com arbitragem por pares.
      * Autor de 7 capítulos de livros técnicos.
      * Galardoado com 9 Prémios Científicos e 5 Menções Honrosas.
      * Galardoado com o Prémio Reuméritus da Sociedade Portuguesa de Reumatologia.

