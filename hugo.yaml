    items:
      - title: "O Reumatologista"
        content: "O Reumatologista é o médico especialista formado e treinado para a prevenção, o diagnóstico e o tratamento das doenças reumáticas. Estas são um conjunto de mais de 100 doenças que podem surgir em qualquer idade, podendo ter diferentes causas e que atingem preferencialmente o tecido conjuntivo das articulações, como a membrana sinovial, a cartilagem e o osso, assim como ligamentos, tendões e músculos. Nas doenças reumáticas sistémicas ou doenças autoimunes podem atingir também outros tecidos ou órgãos, como a pele, as mucosas ou os olhos, e os sistemas nervoso, cardiovascular, respiratório e renal."
